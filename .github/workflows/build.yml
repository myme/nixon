name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-cabal:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        ghc:
          - "9.10"
          - "9.12"
      fail-fast: false

    steps:
    - uses: actions/checkout@v6

    - name: Install packages
      run: |
        sudo apt-get update
        sudo apt-get install hpack

    - name: Hpack
      run: hpack

    - name: Install Haskell
      uses: haskell-actions/setup@v2
      with:
        ghc-version: ${{ matrix.ghc }}

    - name: Cache
      uses: actions/cache@v5
      env:
        cache-name: cache-cabal
      with:
        path: ~/.cabal
        key: ${{ runner.os }}-build-ghc-${{ matrix.ghc }}-${{ env.cache-name }}-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('**/cabal.project') }}
        restore-keys: |
          ${{ runner.os }}-build-ghc-${{ matrix.ghc }}-${{ env.cache-name }}-
          ${{ runner.os }}-build-ghc-${{ matrix.ghc }}-
          ${{ runner.os }}-build-
          ${{ runner.os }}-

    - name: Install dependencies
      run: |
        cabal update
        cabal install --overwrite-policy=always hlint-3.10
        cabal build --only-dependencies --enable-tests --enable-benchmarks

    - name: Hlint
      run: hlint .

    - name: Build
      run: cabal build --enable-tests --enable-benchmarks all
      
    - name: Run tests
      run: cabal test all

  build-nix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: cachix/install-nix-action@v31
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - uses: cachix/cachix-action@v17
      with:
        name: myme
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: Build
      run: nix build -L
